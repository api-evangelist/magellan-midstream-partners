aid: magellan-midstream-partners
name: Magellan Midstream Partners
description: >-
  Magellan Midstream Partners owned the longest refined petroleum products
  pipeline system in the United States, along with refined petroleum products
  and crude oil storage facilities. Magellan Midstream Partners was acquired
  by ONEOK in September 2023 and its assets and operations have been integrated
  into ONEOK's Refined Products and Crude segment. This repository tracks any
  APIs, developer tools, and machine-readable API artifacts made publicly
  available related to the legacy Magellan operations or successor ONEOK
  resources.
